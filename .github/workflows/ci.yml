name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build wasm
        run: pnpm wasm:build
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Bench
        run: pnpm bench
      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-report
          path: benchmarks/last-report.json
